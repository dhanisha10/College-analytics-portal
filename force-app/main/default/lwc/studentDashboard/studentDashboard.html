<template>

    <div style="text-align:center; margin-bottom:30px;">
        <div style="font-size:50px; font-weight:bold;">
            🎓 COLLEGE ANALYTICS PORTAL
        </div>

        <div style="font-size:24px;">
            Student Performance & Placement Monitoring Dashboard
        </div>
    </div>

    <lightning-card title="📋 Student Dashboard">

        <div style="display:flex; gap:30px; margin-bottom:20px; flex-wrap:wrap;">

            <div style="background:#e3f2fd; padding:20px; border-radius:10px; width:220px; text-align:center;">
                <div style="font-size:36px; font-weight:bold;">
                    {totalStudents}
                </div>
                <div style="font-size:16px;">
                    🎓 Total Students
                </div>
            </div>

            <div style="background:#e8f5e9; padding:20px; border-radius:10px; width:220px; text-align:center;">
                <div style="font-size:36px; font-weight:bold;">
                    {totalDepartments}
                </div>
                <div style="font-size:16px;">
                    🏫 Total Departments
                </div>
            </div>

            <div style="background:#fff3cd; padding:20px; border-radius:10px; width:220px; text-align:center;">
                <div style="font-size:36px; font-weight:bold;">
                    {totalDayScholars}
                </div>
                <div style="font-size:16px;">
                    🚶 Day Scholars
                </div>
            </div>

            <div style="background:#f8d7da; padding:20px; border-radius:10px; width:220px; text-align:center;">
                <div style="font-size:36px; font-weight:bold;">
                    {totalHostellers}
                </div>
                <div style="font-size:16px;">
                    🏠 Hostellers
                </div>
            </div>

        </div>

        <div style="padding:10px; display:flex; gap:20px;">

            <lightning-input
                type="search"
                label="Search Department"
                placeholder="Enter department name..."
                onchange={handleDepartmentSearch}>
            </lightning-input>

            <lightning-input
                type="search"
                label="Search Placement Status"
                placeholder="Placed / Not Placed"
                onchange={handlePlacementSearch}>
            </lightning-input>

        </div>

        <lightning-datatable
            key-field="Id"
            data={filteredStudents}
            columns={columns}>
        </lightning-datatable>

    </lightning-card>

</template>
