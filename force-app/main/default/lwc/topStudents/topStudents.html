<template>
    <lightning-card title="🏆 Top Performers">

        <template if:true={students}>
            <template for:each={students} for:item="student">

                <div key={student.Id} class="student-card">

                    <span class="medal">{student.medal}</span>

                    <span class="name">{student.Name}</span>

                    <span class="marks">{student.Average_Marks__c}</span>

                </div>

            </template>
        </template>

    </lightning-card>
</template>
